<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AROW Test - Artemis II</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b1120; font-family: Inter, system-ui, sans-serif; }
    header {
      height: 40px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    header span { color: #fff; font-size: 12px; font-weight: 600; }
    header small { color: #64748b; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; }
    iframe { width: 100%; height: calc(100vh - 40px); border: none; }
  </style>
</head>
<body>
  <header>
    <span>Artemis II</span>
    <small>AROW Test</small>
  </header>
  <iframe src="https://www.nasa.gov/missions/artemis-ii/arow/" title="NASA AROW" allow="accelerometer; gyroscope; webgl"></iframe>
</body>
</html>
